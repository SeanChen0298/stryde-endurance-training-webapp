<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stryde — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent:        #F97316;
      --accent-light:  #FED7AA;
      --accent-dim:    #C2410C;
      --gray-0:        #FFFFFF;
      --gray-50:       #F9F9F9;
      --gray-100:      #F0F0F0;
      --gray-200:      #E0E0E0;
      --gray-400:      #9E9E9E;
      --gray-600:      #5E5E5E;
      --gray-900:      #111111;
      --status-green:  #22C55E;
      --status-amber:  #F59E0B;
      --status-red:    #EF4444;

      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   17px;
      --text-xl:   22px;
      --text-2xl:  28px;
      --text-3xl:  36px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gray-0);
      color: var(--gray-900);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--text-base);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Page enter animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-enter {
      animation: fadeUp 220ms ease-out both;
    }

    /* Logo pulse on mount */
    @keyframes logoPulse {
      0%   { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1);    opacity: 1; }
    }
    .logo-enter {
      animation: logoPulse 300ms ease-out both;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--gray-50);
      border-radius: 16px;
      padding: 32px 24px;
    }

    label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--gray-0);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: var(--text-base);
      color: var(--gray-900);
      outline: none;
      transition: border-color 150ms ease;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    input::placeholder {
      color: var(--gray-400);
    }

    .field-group {
      margin-bottom: 18px;
    }

    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 44px;
    }
    .show-hide {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--gray-400);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .show-hide:hover {
      color: var(--gray-600);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease, transform 100ms ease;
      margin-top: 8px;
    }
    .btn-primary:hover  { background: var(--accent-dim); }
    .btn-primary:active { transform: scale(0.97); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }
    .divider-text {
      font-size: var(--text-xs);
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .error-banner {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: var(--text-sm);
      color: var(--status-red);
      margin-bottom: 18px;
      display: none; /* hidden by default — shown via JS demo below */
    }
  </style>
</head>
<body>

  <div class="page-enter" style="width:100%; max-width:400px;">

    <!-- Brand mark -->
    <div class="logo-enter" style="text-align:center; margin-bottom:36px;">
      <!-- Wordmark -->
      <div style="display:inline-flex; align-items:center; gap:10px; margin-bottom:8px;">
        <!-- Simple icon: pace ring -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="16" stroke="var(--gray-100)" stroke-width="3"/>
          <circle cx="18" cy="18" r="16"
            stroke="var(--accent)" stroke-width="3"
            stroke-dasharray="72 29"
            stroke-dashoffset="25"
            stroke-linecap="round"
            transform="rotate(-90 18 18)"/>
          <circle cx="18" cy="18" r="4" fill="var(--accent)"/>
        </svg>
        <span style="font-size:var(--text-2xl); font-weight:600; color:var(--gray-900); letter-spacing:-0.02em;">
          Stryde
        </span>
      </div>
      <p style="font-size:var(--text-sm); color:var(--gray-400);">Endurance Training Platform</p>
    </div>

    <!-- Card -->
    <div class="card">
      <p style="font-size:var(--text-xl); font-weight:600; color:var(--gray-900); margin-bottom:4px;">
        Welcome back
      </p>
      <p style="font-size:var(--text-sm); color:var(--gray-600); margin-bottom:24px;">
        Sign in to your training dashboard
      </p>

      <!-- Error state (demo — toggle display to show) -->
      <div class="error-banner" id="errorBanner">
        Incorrect email or password. Please try again.
      </div>

      <form id="loginForm" onsubmit="handleSubmit(event)">

        <div class="field-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="faiz@example.my"
            value="faiz@example.my"
            autocomplete="email"
          />
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              value="••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="show-hide"
              onclick="togglePassword(this)"
              aria-label="Show password"
            >Show</button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          Sign in
        </button>

      </form>
    </div>

    <!-- Footer note -->
    <p style="text-align:center; font-size:var(--text-xs); color:var(--gray-400); margin-top:24px; letter-spacing:0.02em;">
      Single-user personal app · Your data stays yours
    </p>

  </div>

  <script>
    function togglePassword(btn) {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? 'Hide' : 'Show';
    }

    function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simulate loading state
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      // Demo: wrong creds → show error; correct → redirect message
      setTimeout(() => {
        const banner = document.getElementById('errorBanner');
        if (email === 'faiz@example.my' && password.length >= 3) {
          btn.textContent = '✓ Signed in — redirecting';
          btn.style.background = 'var(--status-green)';
        } else {
          btn.textContent = 'Sign in';
          btn.disabled = false;
          btn.style.opacity = '1';
          banner.style.display = 'block';
        }
      }, 900);
    }
  </script>

</body>
</html>
